name: ShellCheck

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        shellcheck-version: [v0.10.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq shellcheck
          shellcheck --version

      - name: Run shellcheck (with project config)
        run: |
          echo "=== shellcheck with .shellcheckrc ==="
          find . -name "*.sh" -type f -not -path "*/.git/*" | xargs shellcheck 2>&1 | tee /tmp/sc.out | tail -50
          echo
          echo "=== Summary ==="
          awk "/: error:/ {e++} /: warning:/ {w++} /: note:/ {n++} END {printf \"errors=%d warnings=%d notes=%d\\n\", e+0, w+0, n+0}" /tmp/sc.out
          if grep -q ": error:" /tmp/sc.out; then
            echo "❌ shellcheck errors found"
            exit 1
          fi
          echo "✓ shellcheck passed (no errors)"

      - name: Run bash -n (syntax check)
        run: |
          failed=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "  ✗ syntax error: $f"
              failed=$((failed + 1))
            fi
          done < <(find . -name "*.sh" -type f -not -path "*/.git/*")
          if [ $failed -gt 0 ]; then
            echo "❌ $failed files have syntax errors"
            exit 1
          fi
          echo "✓ all .sh files pass bash -n"
